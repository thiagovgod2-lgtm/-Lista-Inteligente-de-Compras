<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Interface</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:Consolas, monospace;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

.panel{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:80%;
    max-width:700px;
    padding:30px;
    background:rgba(0,0,0,0.7);
    border:1px solid #00ff00;
    box-shadow:0 0 20px #00ff00;
    color:#00ff00;
    z-index:1;
}

h1{
    text-align:center;
    margin-bottom:20px;
    text-shadow:0 0 10px #00ff00;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:black;
    color:#00ff00;
    border:1px solid #00ff00;
    outline:none;
}

button{
    margin-top:10px;
    padding:12px;
    width:100%;
    background:#00ff00;
    color:black;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.output{
    margin-top:20px;
    min-height:100px;
    border:1px solid #00ff00;
    padding:10px;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="panel">
    <h1>MATRIX TERMINAL</h1>

    <input
        type="text"
        id="command"
        placeholder="Digite um comando..."
    >

    <button onclick="executar()">
        EXECUTAR
    </button>

    <div class="output" id="output">
        Sistema iniciado...
    </div>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars =
"アァカサタナハマヤャラワガザダバパ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const letters = chars.split("");

const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];

for(let i=0;i<columns;i++){
    drops[i]=1;
}

function draw(){

    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff00";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){

        const text =
        letters[Math.floor(Math.random()*letters.length)];

        ctx.fillText(
            text,
            i*fontSize,
            drops[i]*fontSize
        );

        if(
            drops[i]*fontSize > canvas.height &&
            Math.random() > 0.975
        ){
            drops[i]=0;
        }

        drops[i]++;
    }
}

setInterval(draw,33);

function executar(){

    const cmd =
    document.getElementById("command")
    .value
    .toLowerCase();

    let resposta = "";

    if(cmd === "help"){
        resposta =
        "Comandos: help, hack, matrix, clear";
    }
    else if(cmd === "hack"){
        resposta =
        "Acesso negado. Firewall detectado.";
    }
    else if(cmd === "matrix"){
        resposta =
        "Bem-vindo à Matrix.";
    }
    else if(cmd === "clear"){
        document.getElementById("output")
        .innerHTML = "";
        return;
    }
    else{
        resposta =
        "Comando desconhecido.";
    }

    document.getElementById("output")
    .innerHTML += "<br>> " + resposta;
}
</script>

</body>
</html>
